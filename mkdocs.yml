site_name: OneSurvey Documentation
site_url: !ENV [MKDOCS_SITE_URL, "https://rstewartIA.github.io/OneSurvey-Docs/"]

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.path
    - navigation.tracking
    - navigation.footer
    - navigation.top
    - content.code.copy
    - content.feedback
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  logo: assets/images/onesurvey-icon.png
  favicon: assets/images/onesurvey-icon.png

extra_css:
  - styles/onesurvey-theme.css

extra_javascript:
  - assets/js/year.js

markdown_extensions:
  - admonition
  - def_list
  - footnotes
  - attr_list
  - toc:
      permalink: true

plugins:
  - search
  - git-revision-date-localized:
      type: date
      enable_creation_date: false
      fallback_to_build_date: true
  - redirects:
      redirect_maps:
        start-here.md: index.md
        help.md: support/index.md
        projects/index.md: sites/index.md
        projects/create-project.md: sites/create-site.md
        projects/project-detail.md: sites/site-detail.md
        projects/site-elements.md: sites/site-elements.md
        projects/site-data.md: sites/site-data.md
        projects/attachments.md: sites/attachments.md
        projects/reports.md: sites/reports.md
        projects/gallery.md: sites/gallery.md
        projects/assignments.md: sites/assignments.md
        projects/tickets.md: sites/tickets.md
        mobile/projects.md: mobile/sites.md
        media/project-photos.md: sites/gallery.md
        media/project-album-detail.md: sites/gallery.md
        projects/project-photos.md: sites/gallery.md
        projects/project-albums.md: sites/gallery.md
        projects/tasks.md: sites/assignments.md
        projects/proposals.md: support/release-notes.md
        projects/onetime.md: support/release-notes.md
        projects/site-settings.md: sites/site-detail.md
        sites/tasks.md: sites/assignments.md
        sites/proposals.md: support/release-notes.md
        sites/onetime.md: support/release-notes.md
        surveys/start-survey.md: surveys/upload-floor-plan.md
        sites/site-settings.md: sites/site-detail.md
        support/tickets.md: support/faq.md
        media/site-photos.md: sites/gallery.md
        media/site-album-detail.md: sites/gallery.md
        getting-started/dashboard-tour.md: index.md
        getting-started/index.md: index.md
        surveys/color-styling.md: surveys/design.md
        surveys/canvas-basics.md: surveys/index.md
        surveys/survey-settings.md: surveys/design.md
        surveys/installation-access.md: surveys/design.md
        surveys/quality-check.md: surveys/version-history.md
        sites/site-photos.md: sites/gallery.md
        sites/site-albums.md: sites/gallery.md

validation:
  omitted_files: ignore

extra:
  generator: false
  # Set CHATBASE_BOT_ID in your environment to enable the chatbot widget.
  chatbase_bot_id: !ENV [CHATBASE_BOT_ID, ""]
  feedback:
    title: Was this page helpful?
    ratings:
      - icon: material/thumb-up-outline
        name: This page was helpful
        data: helpful
        note: Thanks for your feedback!
      - icon: material/thumb-down-outline
        name: This page could be improved
        data: not-helpful
        note: Thanks, we will use this to improve the docs.

copyright: 'Copyright (c) <span id="os-year"></span> OneSurvey'

nav:
  - Start Here:
      - Home: index.md
      - Sign In and Invitations: getting-started/creating-account.md
  - Sites:
      - Overview: sites/index.md
      - Create a Site: sites/create-site.md
      - Site Detail: sites/site-detail.md
      - Site Elements: sites/site-elements.md
      - Site Data: sites/site-data.md
      - Attachments: sites/attachments.md
      - Reports: sites/reports.md
      - Gallery: sites/gallery.md
      - Assignments: sites/assignments.md
      - Tickets: sites/tickets.md
      - OneSnap Overview: media/onesnap.md
  - Surveys:
      - Overview: surveys/index.md
      - Upload a Floor Plan: surveys/upload-floor-plan.md
      - Drag and Drop Elements: surveys/drag-and-drop.md
      - Element Sidebar: surveys/design.md
      - Drawings and Walls: surveys/drawings-and-walls.md
      - Visibility Filters: surveys/visibility-filters.md
      - Element Information: surveys/element-information.md
      - WiseEyes AI (Beta): surveys/wiseeyes-ai.md
      - FoV Adjustment: surveys/fov-adjustment.md
      - Link Photos: surveys/link-photos.md
      - Commenting: surveys/commenting.md
      - Adding a Path: surveys/adding-a-path.md
      - Version History: surveys/version-history.md
  - Mobile:
      - Overview: mobile/index.md
      - Sites: mobile/sites.md
      - Surveys: mobile/surveys.md
      - Assignments and Tickets: mobile/assignments-tickets.md
      - OneSnap: mobile/onesnap.md
      - Settings and Notifications: mobile/settings-notifications.md
      - Cross-Platform Reference: mobile/cross-platform-reference.md
      - Field Tips: mobile/field-tips.md
  - Organization & Access:
      - Organization Settings: organization/index.md
      - Clients: organization/clients.md
      - Users and Roles: organization/users.md
      - Audit Logs: organization/audit-logs.md
  - Help:
      - Help Overview: support/index.md
      - FAQ: support/faq.md
      - Access and Roles: support/access-and-roles.md
      - Glossary: support/glossary.md
      - Release Notes: support/release-notes.md

